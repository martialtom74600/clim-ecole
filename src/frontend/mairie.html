<!DOCTYPE html>
<html lang="fr" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dossier énergie — Commune</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    .panel-scroll { overflow: auto; overscroll-behavior: contain; min-height: 0; }
  </style>
</head>
<body class="bg-slate-950 font-sans text-slate-100 antialiased">
  <div id="app" class="flex h-[100dvh] flex-col">
    <header class="shrink-0 border-b border-slate-800 bg-slate-950/95 px-5 py-4">
      <div class="mx-auto flex max-w-4xl items-start justify-between gap-4">
        <div>
          <p class="text-[11px] font-medium uppercase tracking-widest text-sky-400">Dossier bâtiments scolaires</p>
          <h1 id="commune-title" class="mt-1 text-2xl font-semibold text-white">Chargement…</h1>
          <p id="commune-meta" class="mt-1 text-sm text-slate-400"></p>
        </div>
        <div id="quality-badge" class="hidden shrink-0 rounded-full px-3 py-1 text-xs font-medium"></div>
      </div>
    </header>

    <div id="state-loading" class="flex flex-1 items-center justify-center">
      <div class="h-8 w-8 animate-spin rounded-full border-2 border-slate-700 border-t-sky-500"></div>
    </div>

    <div id="state-error" class="hidden flex-1 items-center justify-center p-6">
      <p id="error-message" class="text-red-300"></p>
    </div>

    <main id="dossier-content" class="hidden min-h-0 flex-1 panel-scroll">
      <div class="mx-auto max-w-4xl space-y-6 px-5 py-6">
        <section class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4" id="kpi-grid"></section>

        <section class="rounded-2xl border border-slate-800 bg-slate-900/50 p-5">
          <h2 class="text-sm font-semibold text-white">Synthèse pour votre collectivité</h2>
          <p id="synthesis-text" class="mt-3 text-sm leading-relaxed text-slate-300"></p>
          <p id="precision-note" class="mt-4 text-[11px] text-slate-500"></p>
        </section>

        <section>
          <h2 class="mb-3 text-sm font-semibold text-white">Établissements scolaires concernés</h2>
          <div id="schools-list" class="space-y-3"></div>
        </section>

        <footer class="border-t border-slate-800 pt-4 text-center text-[11px] text-slate-600">
          Document généré automatiquement · Données ADEME (DPE) · Référentiel Éducation nationale
        </footer>
      </div>
    </main>
  </div>
  <script type="module" src="/assets/mairie.js"></script>
</body>
</html>
